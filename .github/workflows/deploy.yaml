name: Deploy Node App to AWS EC2

on:
  push:
    branches: -master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deply vis SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key:  ${{ secrets.SSH_KEY }}

          script: /home/ubuntu/hello-app
            git pull
            docker compose up -d --build
